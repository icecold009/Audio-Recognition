<!doctype html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DIY Shazam</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --color-bg: #0d0d0f;
            --color-surface: #13131a;
            --color-surface-2: #1a1a24;
            --color-surface-offset: #1f1f2e;
            --color-divider: #2a2a3a;
            --color-border: #2e2e42;

            --color-text: #e8e8f0;
            --color-text-muted: #8888a0;
            --color-text-faint: #4a4a60;

            --color-primary: #1da1f2;
            --color-primary-hover: #0d8dd6;
            --color-primary-active: #0a72ad;
            --color-primary-glow: rgba(29, 161, 242, 0.15);

            --color-success: #1db954;
            --color-error: #e84040;

            --color-wave-1: #1da1f2;
            --color-wave-2: rgba(29, 161, 242, 0.3);

            --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
            --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
            --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
            --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
            --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);

            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;

            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-6: 24px;
            --space-8: 32px;
            --space-12: 48px;
            --space-16: 64px;
        }

        [data-theme="light"] {
            --color-bg: #f5f5f8;
            --color-surface: #ffffff;
            --color-surface-2: #f0f0f5;
            --color-surface-offset: #e8e8f0;
            --color-divider: #d8d8e4;
            --color-border: #c8c8da;
            --color-text: #12121a;
            --color-text-muted: #5a5a72;
            --color-text-faint: #9090a8;
            --color-primary: #0d8dd6;
            --color-primary-hover: #0a72ad;
            --color-primary-glow: rgba(13, 141, 214, 0.12);
        }

        html {
            font-size: 100%;
            color-scheme: dark;
        }

        [data-theme="light"] {
            color-scheme: light;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: var(--text-base);
            line-height: 1.6;
            color: var(--color-text);
            background-color: var(--color-bg);
            background-image: radial-gradient(ellipse 80% 40% at 50% -10%, var(--color-primary-glow), transparent);
            transition: background-color 250ms ease, color 250ms ease;
        }

        .app-wrap {
            width: min(100%, 960px);
            margin: 0 auto;
            padding: var(--space-6) var(--space-4) var(--space-16);
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: var(--space-6);
            border-bottom: 1px solid var(--color-divider);
            margin-bottom: var(--space-8);
        }

        .app-logo {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .app-logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--color-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 16px var(--color-primary-glow);
            flex-shrink: 0;
        }

        .app-logo-icon svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        .app-logo-name {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: var(--text-lg);
            color: var(--color-text);
            letter-spacing: -0.02em;
        }

        .app-logo-name span {
            color: var(--color-primary);
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 200ms ease, color 200ms ease, border-color 200ms ease;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            background: var(--color-surface-2);
            color: var(--color-text);
            border-color: var(--color-primary);
        }

        .theme-toggle svg {
            width: 18px;
            height: 18px;
        }

        [data-theme="dark"] .icon-sun {
            display: block;
        }

        [data-theme="dark"] .icon-moon {
            display: none;
        }

        [data-theme="light"] .icon-sun {
            display: none;
        }

        [data-theme="light"] .icon-moon {
            display: block;
        }

        .page-title {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: var(--text-xl);
            color: var(--color-text);
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        .page-subtitle {
            font-size: var(--text-sm);
            color: var(--color-text-muted);
            margin-top: var(--space-2);
        }

        .section-heading {
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: var(--text-lg);
            color: var(--color-text);
            margin-bottom: var(--space-3);
        }

        .meta-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--text-xs);
            color: var(--color-text-faint);
        }

        .panel {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: var(--space-6);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            transition: background 250ms ease, border-color 250ms ease;
        }

        .stack {
            display: grid;
            gap: var(--space-3);
        }

        label {
            display: grid;
            gap: var(--space-2);
            font-weight: 600;
            font-size: var(--text-sm);
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            background: var(--color-surface-offset);
            color: var(--color-text);
            font: inherit;
            font-size: var(--text-sm);
        }

        input[type="file"]:focus {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        input[type="file"]::file-selector-button {
            background: var(--color-primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            padding: 6px 14px;
            font: inherit;
            font-size: var(--text-sm);
            font-weight: 600;
            cursor: pointer;
            margin-right: 12px;
            transition: background 180ms ease;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--color-primary-hover);
        }

        hr {
            border: 0;
            border-top: 1px solid var(--color-divider);
            margin: var(--space-4) 0;
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 0.75rem 1.25rem;
            font: inherit;
            font-size: var(--text-sm);
            font-weight: 600;
            color: #fff;
            background: var(--color-primary);
            cursor: pointer;
            min-height: 44px;
            transition: transform 180ms ease, background 180ms ease, opacity 180ms ease, box-shadow 180ms ease;
        }

        button:hover:not(:disabled) {
            background: var(--color-primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--color-primary-glow);
        }

        button:active:not(:disabled) {
            background: var(--color-primary-active);
            transform: translateY(0);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.45;
        }

        button:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 3px;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-3);
        }

        #status {
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--text-xs);
            color: var(--color-text-faint);
            background: var(--color-surface-offset);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-3) var(--space-4);
            margin-bottom: var(--space-6);
            line-height: 1.7;
        }

        #result {
            display: grid;
            gap: var(--space-2);
            word-break: break-word;
            color: var(--color-text);
            font-size: var(--text-base);
        }

        #result img {
            max-width: 100%;
            height: auto;
            display: block;
            margin-top: var(--space-3);
            border-radius: var(--radius-lg);
        }

        .hero {
            display: grid;
            gap: var(--space-6);
            margin-bottom: var(--space-8);
        }

        .hero-copy {
            display: grid;
            gap: var(--space-2);
        }

        .cta-shell {
            display: grid;
            gap: var(--space-4);
        }

        .mic-cta {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-primary);
            box-shadow: 0 0 0 0 var(--color-primary-glow);
        }

        .mic-cta svg {
            width: 38px;
            height: 38px;
            fill: #fff;
        }

        .waveform {
            height: 64px;
            display: flex;
            align-items: end;
            justify-content: center;
            gap: 4px;
            padding: 8px 0 0;
        }

        .wave-bar {
            width: 3px;
            height: 12px;
            border-radius: 999px;
            background: var(--color-wave-1);
            opacity: 0.5;
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (max-width: 480px) {
            .app-wrap {
                padding: var(--space-4) var(--space-3) var(--space-12);
            }

            .button-row {
                flex-direction: column;
            }

            .button-row button {
                width: 100%;
            }

            .mic-cta {
                width: 88px;
                height: 88px;
            }
        }
    </style>
</head>

<body>
    <div class="app-wrap">
        <header class="app-header">
            <div class="app-logo">
                <div class="app-logo-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1.5 13.93A7.001 7.001 0 0 1 5 8H3a9 9 0 0 0 8 8.94V20H8v2h8v-2h-3v-3.06A9 9 0 0 0 21 8h-2a7 7 0 0 1-5.5 6.93z" />
                    </svg>
                </div>
                <span class="app-logo-name">DIY <span>Shazam</span></span>
            </div>

            <button class="theme-toggle" id="themeToggle" aria-label="Switch to light mode" title="Toggle theme">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
        </header>

        <div class="hero">
            <div class="hero-copy">
                <h1 class="page-title">Identify any song.</h1>
                <p class="page-subtitle">Upload a WAV/MP3 file or record directly from your microphone.</p>
            </div>

            <div id="status" aria-live="polite" aria-label="Server status">Checking server status…</div>

            <section class="panel cta-shell" aria-label="Music recognition controls">
                <div class="mic-cta" aria-hidden="true">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1.5 13.93A7.001 7.001 0 0 1 5 8H3a9 9 0 0 0 8 8.94V20H8v2h8v-2h-3v-3.06A9 9 0 0 0 21 8h-2a7 7 0 0 1-5.5 6.93z" />
                    </svg>
                </div>

                <div class="waveform" aria-label="Waveform visualizer">
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                </div>

                <label for="fileInput">File upload</label>
                <input id="fileInput" type="file" accept="audio/*" />

                <div class="button-row">
                    <button id="uploadBtn">Upload &amp; Match</button>
                    <button id="recBtn">Start Recording</button>
                    <button id="stopBtn" disabled>Stop</button>
                </div>
            </section>
        </div>

        <section class="stack" aria-label="Recognition result" role="region">
            <h2 class="section-heading">Result</h2>
            <div id="result"></div>
        </section>
    </div>

    <script>
        (function () {
            const root = document.documentElement;
            const btn = document.getElementById('themeToggle');
            const STORE_KEY = 'shazam_theme';
            const saved = localStorage.getItem(STORE_KEY);
            if (saved === 'light' || saved === 'dark') root.setAttribute('data-theme', saved);

            function updateLabel() {
                const isDark = root.getAttribute('data-theme') === 'dark';
                btn.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
            }

            updateLabel();

            btn.addEventListener('click', function () {
                const current = root.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                root.setAttribute('data-theme', next);
                localStorage.setItem(STORE_KEY, next);
                updateLabel();
            });
        })();
    </script>

    <script src="/static/app.js"></script>
</body>

</html>
