<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DIY Shazam - Web</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 760px;
            margin: 24px auto;
            padding: 0 12px;
        }

        h1 {
            font-size: 1.4rem;
        }

        button {
            margin: 6px 0;
        }

        #result img {
            max-width: 300px;
            display: block;
            margin-top: 8px
        }
    </style>
</head>

<body>
    <h1>DIY Shazam - Web</h1>
    <p>Upload a sound file (WAV/MP3) or record from your microphone.</p>

    <div id="status" style="padding:8px;border:1px solid #eee;margin:8px 0;background:#fafafa">
        Checking server status...
    </div>

    <div>
        <label>File upload: <input id="fileInput" type="file" accept="audio/*"></label>
        <button id="uploadBtn">Upload & Match</button>
    </div>

    <hr />

    <div>
        <button id="recBtn">Start Recording</button>
        <button id="stopBtn" disabled>Stop</button>
    </div>

    <h2>Result</h2>
    <div id="result"></div>

    <script src="/static/app.js"></script>
</body>

</html>
