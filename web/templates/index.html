<!doctype html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DIY Shazam</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
    <div class="app-wrap">
        <header class="app-header">
            <div class="app-logo">
                <div class="app-logo-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1.5 13.93A7.001 7.001 0 0 1 5 8H3a9 9 0 0 0 8 8.94V20H8v2h8v-2h-3v-3.06A9 9 0 0 0 21 8h-2a7 7 0 0 1-5.5 6.93z" />
                    </svg>
                </div>
                <span class="app-logo-name">DIY <span>Shazam</span></span>
            </div>

            <button class="theme-toggle" id="themeToggle" aria-label="Switch to light mode" title="Toggle theme">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
        </header>

        <div class="hero">
            <div class="hero-copy">
                <h1 class="page-title">Identify any song.</h1>
                <p class="page-subtitle">Upload a WAV/MP3 file or record directly from your microphone.</p>
            </div>

            <div id="status" aria-live="polite" aria-label="Server status">Checking server status…</div>

            <section class="panel cta-shell" aria-label="Music recognition controls">
                <div class="mic-cta" aria-hidden="true">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1.5 13.93A7.001 7.001 0 0 1 5 8H3a9 9 0 0 0 8 8.94V20H8v2h8v-2h-3v-3.06A9 9 0 0 0 21 8h-2a7 7 0 0 1-5.5 6.93z" />
                    </svg>
                </div>

                <div class="waveform" aria-label="Waveform visualizer">
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                    <span class="wave-bar" data-wave-bar></span>
                </div>

                <label for="fileInput">File upload</label>

                <div class="upload-row">
                    <input id="fileInput" type="file" accept="audio/*" />
                    <button id="uploadBtn">Upload &amp; Match</button>
                </div>

                <div class="button-row">
                    <button id="recBtn">Start Recording</button>
                    <button id="stopBtn" disabled>Stop</button>
                </div>
            </section>
        </div>

        <section class="stack" aria-label="Recognition result" role="region">
            <h2 class="section-heading">Result</h2>
            <div id="result"></div>
        </section>

        <footer class="site-footer">
            <p class="footer-name">Made by Shaurya Saria</p>
            <p class="footer-bio">
                Computer science student building web apps, data-driven tools, and AI projects.
            </p>
        </footer>
    </div>

    <script>
        (function () {
            const root = document.documentElement;
            const btn = document.getElementById('themeToggle');
            const STORE_KEY = 'shazam_theme';
            const saved = localStorage.getItem(STORE_KEY);
            if (saved === 'light' || saved === 'dark') root.setAttribute('data-theme', saved);

            function updateLabel() {
                const isDark = root.getAttribute('data-theme') === 'dark';
                btn.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
            }

            updateLabel();

            btn.addEventListener('click', function () {
                const current = root.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                root.setAttribute('data-theme', next);
                localStorage.setItem(STORE_KEY, next);
                updateLabel();
            });
        })();
    </script>

    <script src="/static/app.js"></script>
</body>

</html>
